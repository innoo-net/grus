<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>grus demo</title>
  <script>
    (function () {
      var pathname = window.location.pathname;
      var filterIndex = pathname.indexOf('/filter/');
      var basePath;

      if (filterIndex !== -1) {
        basePath = pathname.slice(0, filterIndex + 1) || '/';
      } else if (pathname.charAt(pathname.length - 1) === '/') {
        basePath = pathname;
      } else {
        basePath = pathname.split('/').slice(0, -1).join('/') + '/';
      }

      document.write('<base href="' + basePath.replace(/"/g, '&quot;') + '">');
    }());
  </script>
  <link rel="stylesheet" href="dist/grus.css">
  <style>
    body {
      max-width: 980px;
      margin: 48px auto;
      padding: 0 18px;
      background: #f3f4f6;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .note {
      padding: 14px 16px;
      border: 1px solid #dbeafe;
      border-radius: 14px;
      background: #eff6ff;
      color: #1e3a8a;
    }
    pre {
      padding: 16px;
      overflow: auto;
      border-radius: 14px;
      background: #111827;
      color: #f9fafb;
    }
  </style>
</head>
<body>
  <h1>grus</h1>
  <p>JSON定義または変数定義から生成する、素のJavaScript製の条件ビルダーです。AND / OR グループ化、ネスト条件、URL Path同期に対応しています。</p>
  <p class="note">条件を変更すると、現在のURL Pathに <code>/filter/&lt;encoded&gt;</code> が入ります。そのURLを開くと、Pathから条件ツリーを復元します。</p>
  <div id="grus-builder"></div>
  <h2>出力</h2>
  <pre id="output">{}</pre>

  <script src="dist/grus.loader.js"></script>
  <script>
    var output = document.getElementById('output');
    var builderElement = document.getElementById('grus-builder');
    var grusDemoFields = [
      {
            "key": "keyword",
            "label": {
                  "ja": "キーワード",
                  "en": "Keyword"
            },
            "type": "text",
            "placeholder": {
                  "ja": "検索語を入力",
                  "en": "Enter keyword"
            }
      },
      {
            "key": "status",
            "label": {
                  "ja": "ステータス",
                  "en": "Status"
            },
            "type": "select",
            "options": [
                  {
                        "value": "open",
                        "label": {
                              "ja": "未対応",
                              "en": "Open"
                        }
                  },
                  {
                        "value": "progress",
                        "label": {
                              "ja": "対応中",
                              "en": "In progress"
                        }
                  },
                  {
                        "value": "closed",
                        "label": {
                              "ja": "完了",
                              "en": "Closed"
                        }
                  }
            ]
      },
      {
            "key": "price",
            "label": {
                  "ja": "価格",
                  "en": "Price"
            },
            "type": "number"
      },
      {
            "key": "publishedAt",
            "label": {
                  "ja": "公開日",
                  "en": "Published date"
            },
            "type": "date"
      },
      {
            "key": "featured",
            "label": {
                  "ja": "おすすめ",
                  "en": "Featured"
            },
            "type": "boolean"
      }
];

    GrusLoader.load({
      lang: 'ja',
      coreUrl: 'dist/grus.core.js',
      localeBaseUrl: 'locales',
      fields: grusDemoFields,
      target: '#grus-builder',
      urlSync: {
        enabled: true,
        pathKey: 'filter',
        updateMode: 'replace'
      }
    }).then(function (builder) {
      if (builder.getValue().children.length === 0) {
        builder.addCondition();
      }

      output.textContent = JSON.stringify(builder.getValue(), null, 2);

      builderElement.addEventListener('grus:change', function (event) {
        output.textContent = JSON.stringify(event.detail, null, 2);
      });
    });
  </script>
</body>
</html>
