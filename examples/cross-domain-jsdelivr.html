<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>grus cross-domain jsDelivr sample</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/innoo-net/grus@master/dist/grus.css">
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #f7f8fb;
      color: #172033;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
    }
    .panel {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #d8deea;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 12px 32px rgba(15, 23, 42, .08);
    }
    pre {
      overflow: auto;
      padding: 16px;
      border-radius: 12px;
      background: #0f172a;
      color: #e2e8f0;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>grus cross-domain jsDelivr sample</h1>
    <p>
      このHTMLは別ドメイン側に置き、grus本体・CSS・言語JSON・フィールドJSONを
      innoo-net/grus からCDN読み込みするサンプルです。
    </p>

    <div id="builder" class="panel"></div>

    <h2>現在のフィルターJSON</h2>
    <pre id="output">{}</pre>
  </main>

  <script src="https://cdn.jsdelivr.net/gh/innoo-net/grus@master/dist/grus.loader.js"></script>
  <script>
    (function () {
      'use strict';

      /**
       * Writes JSON to the output element.
       * @param {*} value Value to display.
       * @returns {void}
       */
      function _updateOutput(value) {
        var output = document.getElementById('output');
        if (!output) {
          return;
        }
        output.textContent = JSON.stringify(value, null, 2);
      }

      GrusLoader.load({
        lang: 'ja',
        localeBaseUrl: 'https://cdn.jsdelivr.net/gh/innoo-net/grus@master/locales',
        fieldsUrl: 'https://cdn.jsdelivr.net/gh/innoo-net/grus@master/fields.sample.json',
        target: '#builder',
        urlSync: {
          enabled: true,
          pathKey: 'filter',
          updateMode: 'replace',
          readOnInit: true,
          writeOnChange: true,
          removeWhenEmpty: true,
          listenPopState: true
        },
        onChange: function (value) {
          _updateOutput(value);
        }
      }).then(function (builder) {
        if (builder.getValue().children.length === 0) {
          builder.addCondition();
        }
        _updateOutput(builder.getValue());
      }).catch(function (error) {
        console.error(error);
      });
    })();
  </script>
</body>
</html>
