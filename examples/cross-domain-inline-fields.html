<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>grus cross-domain inline fields example</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/innoo-net/grus@master/dist/grus.css">
  <style>
    body {
      max-width: 920px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f3f4f6;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    pre {
      padding: 16px;
      overflow: auto;
      border-radius: 14px;
      background: #111827;
      color: #f9fafb;
    }
  </style>
</head>
<body>
  <h1>grus inline fields example</h1>
  <p>grus本体はCDNから読み込み、フィールド定義は利用側HTMLの変数から渡す例です。</p>

  <div id="builder"></div>
  <pre id="output">{}</pre>

  <script>
    window.GRUS_FIELDS = [
      {
        key: 'keyword',
        label: { ja: 'キーワード', en: 'Keyword' },
        type: 'text',
        placeholder: { ja: '検索語を入力', en: 'Enter keyword' }
      },
      {
        key: 'category',
        label: { ja: 'カテゴリ', en: 'Category' },
        type: 'select',
        options: [
          { value: 'news', label: { ja: 'ニュース', en: 'News' } },
          { value: 'blog', label: { ja: 'ブログ', en: 'Blog' } },
          { value: 'case', label: { ja: '事例', en: 'Case study' } }
        ]
      },
      {
        key: 'publishedAt',
        label: { ja: '公開日', en: 'Published date' },
        type: 'date'
      }
    ];
  </script>

  <script src="https://cdn.jsdelivr.net/gh/innoo-net/grus@master/dist/grus.loader.js"
    data-grus-auto="true"
    data-grus-lang="ja"
    data-grus-locale-base-url="https://cdn.jsdelivr.net/gh/innoo-net/grus@master/locales"
    data-grus-fields-var="GRUS_FIELDS"
    data-grus-target="#builder"
    data-grus-url-sync="true"
    data-grus-url-path-key="filter"
    data-grus-url-update-mode="replace"></script>

  <script>
    var builderElement = document.getElementById('builder');
    var output = document.getElementById('output');

    builderElement.addEventListener('grus:change', function (event) {
      output.textContent = JSON.stringify(event.detail, null, 2);
    });
  </script>
</body>
</html>
