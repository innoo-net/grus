<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>grus cross-domain local fields sample</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/innoo-net/grus@master/dist/grus.css">
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #f7f8fb;
      color: #172033;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
    }
    .panel {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #d8deea;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 12px 32px rgba(15, 23, 42, .08);
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>grus cross-domain local fields sample</h1>
    <p>
      grus本体・CSS・言語JSONはCDNから読み込み、フィールド定義だけを利用側ドメインの
      <code>./fields.local.json</code> から読み込むサンプルです。
    </p>

    <div id="builder" class="panel"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/gh/innoo-net/grus@master/dist/grus.loader.js"></script>
  <script>
    (function () {
      'use strict';

      GrusLoader.load({
        lang: 'ja',
        localeBaseUrl: 'https://cdn.jsdelivr.net/gh/innoo-net/grus@master/locales',
        fieldsUrl: './fields.local.json',
        target: '#builder',
        urlSync: {
          enabled: true,
          pathKey: 'filter',
          updateMode: 'replace'
        }
      }).then(function (builder) {
        if (builder.getValue().children.length === 0) {
          builder.addCondition();
        }
      }).catch(function (error) {
        console.error(error);
      });
    })();
  </script>
</body>
</html>
