<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>grus demo</title>
  <link rel="stylesheet" href="./dist/grus.css">
  <style>
    body {
      max-width: 980px;
      margin: 48px auto;
      padding: 0 18px;
      background: #f3f4f6;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    pre {
      padding: 16px;
      overflow: auto;
      border-radius: 14px;
      background: #111827;
      color: #f9fafb;
    }
  </style>
</head>
<body>
  <h1>grus</h1>
  <p>JSON定義から生成する、素のJavaScript製の条件ビルダーです。AND / OR グループ化とネスト条件に対応しています。</p>
  <div id="grus-builder"></div>
  <h2>出力</h2>
  <pre id="output">{}</pre>

  <script src="./dist/grus.loader.js"></script>
  <script>
    var output = document.getElementById('output');
    var builderElement = document.getElementById('grus-builder');

    GrusLoader.load({
      lang: 'ja',
      coreUrl: './dist/grus.core.js',
      localeBaseUrl: './locales',
      fieldsUrl: './fields.sample.json',
      target: '#grus-builder'
    }).then(function (builder) {
      builder.addCondition();
      output.textContent = JSON.stringify(builder.getValue(), null, 2);

      builderElement.addEventListener('grus:change', function (event) {
        output.textContent = JSON.stringify(event.detail, null, 2);
      });
    });
  </script>
</body>
</html>
