<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>grus demo</title>
  <link rel="stylesheet" href="./dist/grus.css">
  <style>
    body {
      max-width: 920px;
      margin: 48px auto;
      padding: 0 18px;
      background: #f3f4f6;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    pre {
      padding: 16px;
      overflow: auto;
      border-radius: 14px;
      background: #111827;
      color: #f9fafb;
    }
  </style>
</head>
<body>
  <h1>grus</h1>
  <p>JSON定義から生成する、素のJavaScript製の条件ビルダーです。</p>
  <div id="grus-builder"></div>
  <h2>出力</h2>
  <pre id="output">[]</pre>

  <script src="./dist/grus.loader.js"
    data-grus-auto="true"
    data-grus-lang="ja"
    data-grus-locale-base-url="./locales"
    data-grus-fields-url="./fields.sample.json"
    data-grus-target="#grus-builder"></script>

  <script>
    document.getElementById('grus-builder').addEventListener('grus:change', function (event) {
      document.getElementById('output').textContent = JSON.stringify(event.detail, null, 2);
    });
  </script>
</body>
</html>
